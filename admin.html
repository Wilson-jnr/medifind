<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — PharmFinderz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#1D9E75;--green-dk:#0F6E56;--green-lt:#E1F5EE;--green-md:#9FE1CB;--green-tx:#085041;--amber-bg:#FAEEDA;--amber-tx:#854F0B;--red-bg:#FCEBEB;--red-tx:#A32D2D;--ink:#1a1a1a;--ink2:#555;--ink3:#888;--bg:#f7f6f2;--card:#fff;--bd:#e5e3dc;--bd2:#ccc9c0;--r:12px;--rs:8px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
    nav{background:#0F1A14;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;position:sticky;top:0;z-index:100;gap:8px}
    .nav-logo{font-family:'Fraunces',serif;font-size:18px;font-weight:500;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;flex-shrink:0}
    .nav-logo span{color:var(--green)}
    .nav-badge{font-size:11px;background:var(--green);color:#fff;padding:2px 8px;border-radius:99px;font-weight:500}
    .nav-right{display:flex;align-items:center;gap:8px;min-width:0}
    .nav-user{font-size:13px;color:rgba(255,255,255,.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
    .nav-logout{font-size:13px;color:rgba(255,255,255,.5);background:none;border:1px solid rgba(255,255,255,.15);cursor:pointer;padding:5px 10px;border-radius:var(--rs);font-family:'DM Sans',sans-serif;white-space:nowrap}
    .nav-logout:hover{background:rgba(255,255,255,.1);color:#fff}
    @media(max-width:480px){.nav-user{display:none}}

    /* LOGIN */
    .login-wrap{max-width:380px;margin:3rem auto;padding:0 1rem}
    .login-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1.75rem 1.5rem}
    .login-icon{width:42px;height:42px;background:#0F1A14;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
    .login-title{font-family:'Fraunces',serif;font-size:20px;font-weight:500;margin-bottom:.25rem}
    .login-sub{font-size:13px;color:var(--ink2);margin-bottom:1.5rem}
    .field{margin-bottom:1rem}
    .field label{font-size:13px;font-weight:500;display:block;margin-bottom:5px}
    .field input{width:100%;font-family:'DM Sans',sans-serif;font-size:16px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--card);color:var(--ink);padding:0 12px;height:44px;-webkit-appearance:none}
    .field input:focus{outline:none;border-color:#0F1A14}
    .btn-dark{width:100%;height:44px;border-radius:var(--rs);background:#0F1A14;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-dark:hover{opacity:.85}
    .btn-dark:disabled{opacity:.5;cursor:not-allowed}
    .error-banner{background:var(--red-bg);border:1px solid #F09595;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red-tx);margin-top:1rem;display:none}

    /* ADMIN */
    .admin{display:none;max-width:920px;margin:0 auto;padding:1.25rem 1rem 4rem}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
    @media(max-width:600px){.stats{grid-template-columns:1fr 1fr}}
    .stat{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:.875rem 1rem}
    .stat-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
    .stat-val{font-size:22px;font-weight:500}
    .stat-val.amber{color:var(--amber-tx)}.stat-val.green{color:var(--green-tx)}
    .stat-sub{font-size:11px;color:var(--ink3);margin-top:2px}

    .section{margin-bottom:2.5rem}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
    .section-title{font-family:'Fraunces',serif;font-size:18px;font-weight:500}
    .section-count{font-size:12px;padding:3px 10px;border-radius:99px;font-weight:500;white-space:nowrap}
    .count-amber{background:var(--amber-bg);color:var(--amber-tx)}
    .count-green{background:var(--green-lt);color:var(--green-tx)}

    .ph-list{display:flex;flex-direction:column;gap:10px}
    .ph-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1rem 1.125rem}
    .ph-card.pending{border-left:3px solid var(--amber-tx)}
    .ph-card.verified{border-left:3px solid var(--green)}
    .ph-card-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
    .ph-info{flex:1;min-width:0}
    .ph-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:4px;word-break:break-word}
    .ph-detail{font-size:12px;color:var(--ink2);margin-bottom:3px;display:flex;align-items:flex-start;gap:5px;flex-wrap:wrap}
    .ph-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
    .ph-tag{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--bg);color:var(--ink2);border:1px solid var(--bd);white-space:nowrap}
    .ph-actions{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
    @media(max-width:520px){.ph-card-inner{flex-direction:column}.ph-actions{width:100%}}

    .btn-approve{height:34px;padding:0 13px;border-radius:var(--rs);background:var(--green);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
    .btn-approve:hover{background:var(--green-dk)}
    .btn-premium{height:34px;padding:0 13px;border-radius:var(--rs);background:#0F1A14;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
    .btn-premium:hover{opacity:.85}
    .btn-unverify{height:34px;padding:0 13px;border-radius:var(--rs);background:transparent;color:var(--ink2);border:1px solid var(--bd2);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}
    .btn-unverify:hover{background:var(--bg)}
    .btn-reject,.btn-delete{height:34px;padding:0 13px;border-radius:var(--rs);background:transparent;color:var(--red-tx);border:1px solid #F09595;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap}
    .btn-reject:hover,.btn-delete:hover{background:var(--red-bg)}

    .empty{text-align:center;padding:2rem 1rem;color:var(--ink3);font-size:13px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r)}
    .toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:#0F1A14;color:#fff;padding:11px 18px;border-radius:var(--rs);font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.15);display:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
    .toast.ok{background:var(--green-tx)}.toast.err{background:var(--red-tx)}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:4px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<nav>
  <div style="display:flex;align-items:center;gap:8px">
    <a class="nav-logo" href="index.html">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="color:var(--green)"><path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-4"/><path d="M9 3a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v0a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2z"/><path d="M12 11v6"/><path d="M9 14h6"/></svg>
      Pharm<span>Finderz</span>
    </a>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-right">
    <span class="nav-user" id="nav-user" style="display:none"></span>
    <button class="nav-logout" id="btn-logout" onclick="logout()" style="display:none">Log out</button>
  </div>
</nav>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <p class="login-title">Admin login</p>
    <p class="login-sub">This page is for PharmFinderz administrators only.</p>
    <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="admin@pharmfinderz.co.zw" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="field"><label>Password</label><input type="password" id="l-pw" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-dark" id="login-btn" onclick="doLogin()">Log in to admin panel</button>
    <div class="error-banner" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="admin-panel">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-val" id="stat-total">—</div><div class="stat-sub">pharmacies</div></div>
    <div class="stat"><div class="stat-label">Pending</div><div class="stat-val amber" id="stat-pending">—</div><div class="stat-sub">awaiting review</div></div>
    <div class="stat"><div class="stat-label">Verified</div><div class="stat-val green" id="stat-verified">—</div><div class="stat-sub">live on site</div></div>
    <div class="stat"><div class="stat-label">Medicines</div><div class="stat-val" id="stat-medicines">—</div><div class="stat-sub">listed total</div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <p class="section-title">Pending approval</p>
      <span class="section-count count-amber" id="pending-count">0 pending</span>
    </div>
    <div class="ph-list" id="pending-list"><div class="empty"><span class="spinner" style="border-color:var(--bd2);border-top-color:var(--green)"></span> Loading…</div></div>
  </div>

  <div class="section">
    <div class="section-head">
      <p class="section-title">Verified pharmacies</p>
      <span class="section-count count-green" id="verified-count">0 verified</span>
    </div>
    <div class="ph-list" id="verified-list"><div class="empty"><span class="spinner" style="border-color:var(--bd2);border-top-color:var(--green)"></span> Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://ultudsxmjvzjfojoyjfu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdHVkc3htanZ6amZvam95amZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1NzUxNjUsImV4cCI6MjA5NDE1MTE2NX0._3Qk2WO1fZ6P41Z3ZBtoJdHBs3r-jSURs0f-IZZ3xMw';

// ── ADMIN EMAILS — only these emails can access the admin panel ──
const ADMIN_EMAILS = [
  'YOUR_ADMIN_EMAIL_HERE'  // replace with your real email
];
// ─────────────────────────────────────────────────────────────────

let session=null;
async function supaFetch(path,opts={}){
  const headers={'apikey':SUPA_KEY,'Authorization':'Bearer '+(session?session.access_token:SUPA_KEY),'Content-Type':'application/json',...opts.headers};
  const res=await fetch(SUPA_URL+path,{...opts,headers});
  if(!res.ok){const e=await res.json().catch(()=>({message:res.statusText}));throw new Error(e.message||'Request failed')}
  const t=await res.text();return t?JSON.parse(t):null
}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim(),pw=document.getElementById('l-pw').value;
  const btn=document.getElementById('login-btn'),err=document.getElementById('login-error');
  if(!email||!pw){err.textContent='Please enter your email and password.';err.style.display='block';return}

  // Check admin whitelist before even trying to log in
  if(!ADMIN_EMAILS.includes(email.toLowerCase())){
    err.textContent='Access denied. This page is for PharmFinderz administrators only.';
    err.style.display='block';
    return;
  }

  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Logging in…';err.style.display='none';
  try{
    const data=await supaFetch('/auth/v1/token?grant_type=password',{method:'POST',body:JSON.stringify({email,password:pw})});
    session=data;
    document.getElementById('nav-user').textContent=email;document.getElementById('nav-user').style.display='inline';
    document.getElementById('btn-logout').style.display='inline-block';
    document.getElementById('login-screen').style.display='none';document.getElementById('admin-panel').style.display='block';
    await loadAll();
  }catch(e){err.textContent='Login failed. Please check your email and password.';err.style.display='block';btn.disabled=false;btn.textContent='Log in to admin panel'}
}
function logout(){
  session=null;document.getElementById('login-screen').style.display='block';document.getElementById('admin-panel').style.display='none';
  document.getElementById('nav-user').style.display='none';document.getElementById('btn-logout').style.display='none';
  document.getElementById('l-pw').value='';document.getElementById('login-btn').disabled=false;document.getElementById('login-btn').textContent='Log in to admin panel';
}
async function loadAll(){
  try{
    const[pharmacies,medicines]=await Promise.all([supaFetch('/rest/v1/pharmacies?select=*&order=created_at.desc'),supaFetch('/rest/v1/medicines?select=id,pharmacy_id')]);
    const pending=pharmacies.filter(p=>!p.is_verified),verified=pharmacies.filter(p=>p.is_verified);
    document.getElementById('stat-total').textContent=pharmacies.length;
    document.getElementById('stat-pending').textContent=pending.length;
    document.getElementById('stat-verified').textContent=verified.length;
    document.getElementById('stat-medicines').textContent=medicines?medicines.length:0;
    document.getElementById('pending-count').textContent=pending.length+' pending';
    document.getElementById('verified-count').textContent=verified.length+' verified';
    renderPending(pending,medicines||[]);renderVerified(verified,medicines||[]);
  }catch(e){showToast('Failed to load: '+e.message,'err')}
}
function medCount(id,meds){return meds.filter(m=>m.pharmacy_id===id).length}
function fmtDate(ts){if(!ts)return'—';return new Date(ts).toLocaleDateString('en-ZW',{day:'numeric',month:'short',year:'numeric'})}
function renderPending(list,meds){
  const el=document.getElementById('pending-list');
  if(!list.length){el.innerHTML='<div class="empty">✓ No pharmacies waiting for approval — you\'re all caught up!</div>';return}
  el.innerHTML=list.map(p=>`
    <div class="ph-card pending" id="card-${p.id}">
      <div class="ph-card-inner">
        <div class="ph-info">
          <div class="ph-name">${p.name}</div>
          <div class="ph-detail">${[p.street,p.suburb,p.city].filter(Boolean).join(', ')}${p.landmark?' · Near '+p.landmark:''}</div>
          <div class="ph-detail">${p.phone||'—'} · ${p.email||'—'}</div>
          <div class="ph-meta">
            <span class="ph-tag">Registered ${fmtDate(p.created_at)}</span>
            ${p.offers_delivery?'<span class="ph-tag">Offers delivery</span>':''}
            ${p.opens_at?'<span class="ph-tag">'+p.opens_at.slice(0,5)+' – '+((p.closes_at||'').slice(0,5))+'</span>':''}
          </div>
        </div>
        <div class="ph-actions">
          <button class="btn-approve" onclick="approvePharmacy('${p.id}')">✓ Approve</button>
          <button class="btn-reject" onclick="deletePharmacy('${p.id}','${p.name.replace(/'/g,"\\'")}')">✕ Reject</button>
        </div>
      </div>
    </div>`).join('');
}
function renderVerified(list,meds){
  const el=document.getElementById('verified-list');
  if(!list.length){el.innerHTML='<div class="empty">No verified pharmacies yet. Approve some from the pending list above.</div>';return}
  el.innerHTML=list.map(p=>{const mc=medCount(p.id,meds);return`
    <div class="ph-card verified" id="card-${p.id}">
      <div class="ph-card-inner">
        <div class="ph-info">
          <div class="ph-name">${p.name}${p.plan==='premium'?' ⭐':''}</div>
          <div class="ph-detail">${p.suburb||''}, ${p.city||''} · ${p.email||'—'}</div>
          <div class="ph-meta">
            <span class="ph-tag" style="background:var(--green-lt);color:var(--green-tx);border-color:var(--green-md)">${mc} medicine${mc===1?'':'s'}</span>
            <span class="ph-tag">${p.plan==='premium'?'⭐ Premium':'Free plan'}</span>
            <span class="ph-tag">Since ${fmtDate(p.created_at)}</span>
            ${p.offers_delivery?'<span class="ph-tag">Delivery</span>':''}
          </div>
        </div>
        <div class="ph-actions">
          <button class="btn-premium" onclick="togglePlan('${p.id}','${p.plan||'free'}')">${p.plan==='premium'?'Downgrade':'⭐ Premium'}</button>
          <button class="btn-unverify" onclick="unverifyPharmacy('${p.id}')">Unverify</button>
          <button class="btn-delete" onclick="deletePharmacy('${p.id}','${p.name.replace(/'/g,"\\'")}')">Delete</button>
        </div>
      </div>
    </div>`}).join('');
}
async function approvePharmacy(id){try{await supaFetch('/rest/v1/pharmacies?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({is_verified:true})});showToast('Pharmacy approved ✓','ok');await loadAll()}catch(e){showToast('Failed: '+e.message,'err')}}
async function unverifyPharmacy(id){try{await supaFetch('/rest/v1/pharmacies?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({is_verified:false})});showToast('Pharmacy moved to pending','ok');await loadAll()}catch(e){showToast('Failed: '+e.message,'err')}}
async function togglePlan(id,cur){const np=cur==='premium'?'free':'premium';try{await supaFetch('/rest/v1/pharmacies?id=eq.'+id,{method:'PATCH',headers:{'Prefer':'return=minimal'},body:JSON.stringify({plan:np})});showToast('Plan updated to '+np,'ok');await loadAll()}catch(e){showToast('Failed: '+e.message,'err')}}
async function deletePharmacy(id,name){if(!confirm('Permanently delete "'+name+'"? This cannot be undone.'))return;try{await supaFetch('/rest/v1/pharmacies?id=eq.'+id,{method:'DELETE'});showToast(name+' deleted','ok');await loadAll()}catch(e){showToast('Failed: '+e.message,'err')}}
let toastTimer;
function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.style.display='none'},3500)}
</script>
</body>
</html>
